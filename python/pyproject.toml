[build-system]
requires = [
  "setuptools>=55.0",
  "Cython>=3",
  "numpy>=1.16.6",
  "pyarrow~=21.0.0",
]

build-backend = "setuptools.build_meta"

[project]
name = "palletjack"
version = "2.7.0"
description = "Faster parquet metadata reading"
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
  "pyarrow~=21.0.0",
]

[tool.cibuildwheel]
skip = "*_i686 *-musllinux_* *win32 cp313-*"
before-build = "pip install auditwheel"
repair-wheel-command = "auditwheel repair --exclude libarrow.so.2100 --exclude libparquet.so.2100 -w {dest_dir} {wheel}"

# We use manylinux_2_28 for ABI compatibility with pyarrow
# With the default image we were getting "undefined symbol: _ZNK5arrow6Status8ToStringEv" error (e.g https://github.com/ray-project/ray/issues/24566)       
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"

# Install system library
[tool.cibuildwheel.linux]

# Run multiple commands using an array
before-all = [
  "git clone --depth 1 --branch v0.19.0 https://github.com/apache/thrift.git",
  "yum -y update",
  "yum -y groupinstall 'Development Tools'",
  "yum -y install libevent-devel zlib-devel openssl-devel",
  "cd thrift",
  "./bootstrap.sh",
  "./configure --with-lua=no",
  "make",
  "make install",
]

[tool.setuptools.packages.find]
include = ['palletjack*']

[tool.setuptools.package-data]
"*" = ["*.pxd", "*.h", "*.pyx"]

[project.urls]
Homepage = "https://github.com/G-Research/PalletJack"
Issues = "https://github.com/G-Research/PalletJack/issues"
